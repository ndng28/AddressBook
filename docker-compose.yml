# Docker Compose for local development
# Usage: docker-compose up -d

version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: addressbook-db-dev
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: addressbook
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d addressbook"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: addressbook-app-dev
    environment:
      DATABASE_URL: postgresql://user:password@db:5432/addressbook
      ENVIRONMENT: development
      DEBUG: "true"
      SECRET_KEY: dev-secret-key-not-for-production
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
